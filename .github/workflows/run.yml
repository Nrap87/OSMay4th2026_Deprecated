name: Run TypeScript

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'  # optional: weekly schedule

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx ts-node src/index.ts