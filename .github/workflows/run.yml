name: Scheduled solve dry + submit

on:
  workflow_dispatch:
  repository_dispatch:
    types: [scheduled-run]

jobs:
  solve-dry-submit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run build:server
      - run: npm run solve:dry:submit