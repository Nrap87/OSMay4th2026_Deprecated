name: Scheduled solve dry + submit
on:
  schedule:
    - cron: "50 22 * * *" # 00:00 UTC daily
jobs:
  solve-dry-submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build:server
      - run: npm run solve:dry:submit